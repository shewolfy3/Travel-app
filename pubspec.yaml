name: travel_app
description: A travel booking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  get: ^4.6.6

  # Networking
  dio: ^5.4.0

  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  pinput: ^3.0.1
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0

  # File & media
  file_picker: ^6.1.1
  image_picker: ^1.0.7

  # Maps
  google_maps_flutter: ^2.5.3

  # Payment
  flutter_stripe: ^10.1.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/